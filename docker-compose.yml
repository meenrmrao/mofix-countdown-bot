version: "3.9"

services:
  web:
    build: .
    container_name: mofix-web
    command: gunicorn -w 2 -b 0.0.0.0:5000 run_web:app
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - mofix-data:/app/data
      - mofix-backups:/app/backups
    restart: unless-stopped

  bot:
    build: .
    container_name: mofix-bot
    command: python run_bot.py
    env_file:
      - .env
    volumes:
      - mofix-data:/app/data
    restart: unless-stopped
    depends_on:
      - web

volumes:
  mofix-data:
  mofix-backups:
