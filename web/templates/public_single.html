<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ countdown.title_line }} — MOFIX Countdown</title>
<meta name="description" content="{{ countdown.title_line }}: {{ countdown.subtitle_line }}. Live countdown updating in real time.">
<meta name="theme-color" content="#05070d">
<meta property="og:title" content="{{ countdown.title_line }}">
<meta property="og:description" content="{{ countdown.subtitle_line }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="site-body">
  <div class="scanline"></div>
  <div class="grid-glow"></div>

  <header class="site-header">
    <a class="site-brand" href="{{ url_for('public_home') }}">
      <span class="site-brand-mark">M</span>
      <span class="site-brand-name">MOFIX</span>
    </a>
  </header>

  <main class="site-main">
    <section class="console" id="console" data-slug="{{ countdown.slug }}">
      <div class="console-ring"></div>
      <div class="console-eyebrow">🚀 {{ countdown.title_line }}</div>
      <h1 class="console-title" id="subtitle">⏳ {{ countdown.subtitle_line }}</h1>

      <div class="digits" id="digits">
        <div class="digit-block">
          <span class="digit-value" id="d-days">00</span>
          <span class="digit-label">Days</span>
        </div>
        <div class="digit-sep">:</div>
        <div class="digit-block">
          <span class="digit-value" id="d-hours">00</span>
          <span class="digit-label">Hours</span>
        </div>
        <div class="digit-sep">:</div>
        <div class="digit-block">
          <span class="digit-value" id="d-minutes">00</span>
          <span class="digit-label">Minutes</span>
        </div>
        <div class="digit-sep">:</div>
        <div class="digit-block">
          <span class="digit-value" id="d-seconds">00</span>
          <span class="digit-label">Seconds</span>
        </div>
      </div>

      <div class="live-banner" id="live-banner" hidden>
        🎉 Released Successfully
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>MOFIX Countdown System</span>
  </footer>

  <script src="{{ url_for('static', filename='js/countdown.js') }}"></script>
</body>
</html>
