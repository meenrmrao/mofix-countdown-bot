{% extends "base.html" %}
{% block title %}{{ "Edit" if countdown else "New" }} Countdown — MOFIX Admin{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>{{ "Edit Countdown" if countdown else "New Countdown" }}</h1>
    <p class="muted">Set the release date, chat, and messaging for this countdown.</p>
  </div>
  <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">← Back</a>
</div>

<form method="POST" class="form-card">
  <div class="form-grid">
    <div class="form-field">
      <label>Countdown Name</label>
      <input type="text" name="name" value="{{ countdown.name if countdown else '' }}" required>
    </div>
    <div class="form-field">
      <label>URL Slug (optional)</label>
      <input type="text" name="slug" value="{{ countdown.slug if countdown else '' }}" placeholder="auto-generated from name">
    </div>

    <div class="form-field">
      <label>Target Date &amp; Time</label>
      <input type="datetime-local" name="target_datetime"
             value="{{ (countdown.target_datetime_utc.strftime('%Y-%m-%dT%H:%M')) if countdown else '' }}" required>
    </div>
    <div class="form-field">
      <label>Timezone</label>
      <select name="timezone">
        {% for tz in timezones %}
          <option value="{{ tz }}" {{ "selected" if countdown and countdown.timezone == tz else "" }}>{{ tz }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-field">
      <label>Telegram Chat ID / @channel</label>
      <input type="text" name="chat_id" value="{{ countdown.chat_id if countdown else '' }}" placeholder="-1001234567890 or @mychannel">
    </div>
    <div class="form-field">
      <label>Title Line</label>
      <input type="text" name="title_line" value="{{ countdown.title_line if countdown else 'MOFIX AUTH TOOL' }}">
    </div>

    <div class="form-field">
      <label>Subtitle Line</label>
      <input type="text" name="subtitle_line" value="{{ countdown.subtitle_line if countdown else 'Release Countdown' }}">
    </div>
    <div class="form-field">
      <label>Live Message (shown at zero)</label>
      <input type="text" name="live_message" value="{{ countdown.live_message if countdown else 'MOFIX AUTH TOOL IS NOW LIVE!' }}">
    </div>

    <div class="form-field form-field-wide">
      <label>Announcement Message (new message sent when countdown ends)</label>
      <textarea name="announcement_text" rows="3">{{ countdown.announcement_text if countdown else "The wait is over! 🎉" }}</textarea>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">{{ "Save Changes" if countdown else "Create Countdown" }}</button>
    <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
  </div>
</form>
{% endblock %}
